name: Ghosted
options:
  bundleIdPrefix: com.shimondeitel.ghosted
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ghosted:
    type: application
    platform: iOS
    sources:
      - path: Ghosted
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ghosted
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ghosted/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  GhostedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GhostedTests
      - path: Ghosted.storekit
    dependencies:
      - target: Ghosted
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ghosted.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  GhostedUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: GhostedUITests
    dependencies:
      - target: Ghosted
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ghosted.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ghosted:
    build:
      targets:
        Ghosted: all
        GhostedTests: [test]
        GhostedUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Ghosted.storekit
    test:
      config: Debug
      storeKitConfiguration: Ghosted.storekit
      targets:
        - GhostedTests
        - GhostedUITests
    archive:
      config: Release
